<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ROAD2AIR</title>
    <meta name="description" content="ROAD2AIR — Tactical Air Base Management" />

    <meta property="og:title" content="ROAD2AIR" />
    <meta property="og:description" content="ROAD2AIR — Tactical Air Base Management" />
    <meta property="og:type" content="website" />
    <!-- GitHub Pages SPA redirect: decode the path encoded by 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = new URL(redirect);
          window.history.replaceState(null, null, url.pathname + url.search + url.hash);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
